<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Flight Planner</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link active">Scan</a>
                <a href="/tracks.html" class="nav-link">Tracks</a>
                <a href="/automate.html" class="nav-link">Automate</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/settings.html" class="nav-link">Settings</a>
                <a href="/logs.html" class="nav-link">Logs</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawlerFromHeader()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Manual & Silent Updating</span>
            </div>
        </div>
    </header>

    <section class="search-bar" id="searchBar">
        <div class="search-bar-inner">
            <div class="search-row-compact">
                <span class="search-label">WHERE:</span>
                <div class="city-select-wrapper" id="originCityWrapper">
                    <input type="text" id="originCity" placeholder="From" autocomplete="off" class="compact-input city-input" readonly>
                    <div class="city-dropdown hidden" id="originCityDropdown"></div>
                </div>
                <span class="compact-arrow swap-arrow" onclick="swapCities()" title="Swap cities">→</span>
                <div class="city-select-wrapper" id="destinationCityWrapper">
                    <input type="text" id="destinationCity" placeholder="To" autocomplete="off" class="compact-input city-input" readonly>
                    <div class="city-dropdown hidden" id="destinationCityDropdown"></div>
                </div>
                <span class="search-divider"></span>
                <span class="search-label">DATES:</span>
                <span class="date-wrapper">
                    <input type="text" id="dateFromDisplay" class="compact-input date-input" readonly>
                    <input type="date" id="dateFrom" class="date-hidden-picker">
                </span>
                <span class="compact-arrow">→</span>
                <span class="date-wrapper">
                    <input type="text" id="dateToDisplay" class="compact-input date-input" readonly>
                    <input type="date" id="dateTo" class="date-hidden-picker">
                </span>
                <span class="search-divider"></span>
                <span class="search-label">AIRLINES:</span>
                <div class="airline-toggle-all" onclick="toggleAllAirlines()" title="Select / Deselect all">ALL</div>
                <div class="airline-toggles" id="airlineToggles"></div>
                <button class="btn-search" id="btnSearch" onclick="launchSearch()">
                    <span id="searchBtnText">SCAN</span>
                    <span id="searchLoader" class="loader hidden"></span>
                </button>
            </div>
        </div>
    </section>

    <!-- Search in progress band -->
    <section class="search-progress-band hidden" id="searchProgressBand">
        <div class="progress-inner">
            <span class="loader"></span>
            <span class="progress-text" id="progressText">Searching...</span>
            <button class="btn-cancel" id="btnCancel" onclick="cancelSearch()">Cancel</button>
        </div>
    </section>

    <!-- Recap Banner (sticky): OUT | TOTAL+DAYS | RET -->
    <section class="recap-banner hidden" id="recapBanner">
        <div class="recap-inner">
            <div class="recap-section recap-outbound">
                <span class="recap-tag">OUT</span>
                <span class="recap-detail" id="recapOutDetail">—</span>
            </div>
            <div class="recap-total-box">
                <span class="recap-total-price" id="recapTotal">0 €</span>
                <span class="recap-total-days" id="recapDays"></span>
            </div>
            <div class="recap-section recap-return">
                <span class="recap-tag">RET</span>
                <span class="recap-detail" id="recapRetDetail">—</span>
            </div>
            <div class="recap-section recap-fees" style="display:none">
                <span class="recap-breakdown" id="recapBreakdown"></span>
            </div>
        </div>
    </section>

    <main class="main-content" id="mainContent">
        <!-- Central loader (inside mainContent only) -->
        <div class="central-loader hidden" id="centralLoader">
            <div class="central-loader-inner">
                <div class="loader" style="width:36px;height:36px;border-width:3px"></div>
                <p>Scanning flights. Please wait... 🛫</p>
                <p class="search-estimate" id="searchEstimate"></p>
                <p class="search-timer" id="searchTimer">⏱ 00:00</p>
            </div>
        </div>

        <!-- Column headers -->
        <div class="flight-grid-header" id="flightGridHeader">
            <div class="col-title">Outbound</div>
            <div class="col-title col-title-center">Date</div>
            <div class="col-title">Return</div>
        </div>

        <!-- Flight grid: rows rendered by JS -->
        <div class="flight-grid" id="flightGrid">
            <div class="empty-state" id="emptyState">
                <p>Launch a search to see available flights</p>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/calendar.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
