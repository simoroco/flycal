<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Pins</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        .pins-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .pins-title { color: var(--accent); font-size: 1.5rem; margin-bottom: 20px; }
        #pinsContent { border-radius: var(--radius-lg); }
        .pins-empty { color: var(--text-muted); text-align: center; padding: 60px 20px; font-size: 1rem; border-radius: var(--radius-lg); background: var(--glass-bg); border: 1px solid var(--glass-border); }

        .pin-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin-bottom: 12px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
        }

        /* Compact top band: header + details + actions on one line */
        .pin-top-band {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: nowrap;
        }
        .pin-logo { width: 26px; height: 26px; border-radius: 4px; flex-shrink: 0; }
        .pin-airline { font-weight: 700; color: var(--text); font-size: 0.85rem; white-space: nowrap; }
        .pin-direction-badge {
            font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px;
            text-transform: uppercase; flex-shrink: 0;
        }
        .pin-direction-badge.outbound { background: rgba(108,99,255,0.2); color: var(--accent); }
        .pin-direction-badge.return { background: rgba(0,200,100,0.2); color: var(--green); }
        .pin-route { color: var(--text-muted); font-size: 0.78rem; white-space: nowrap; }
        .pin-sep { color: rgba(255,255,255,0.15); font-size: 0.9rem; }

        .pin-info { font-size: 0.78rem; color: var(--text); white-space: nowrap; }
        .pin-info-label { color: var(--text-muted); font-size: 0.65rem; margin-right: 3px; }
        .pin-info-value { font-weight: 600; }

        .pin-price-change { font-size: 0.7rem; margin-left: 2px; }
        .pin-price-change.down { color: var(--green); }
        .pin-price-change.up { color: var(--red); }

        .pin-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }

        /* Chart */
        .pin-chart-container { margin-top: 10px; position: relative; height: 120px; }
        .pin-chart-empty { color: var(--text-muted); text-align: center; padding: 20px; font-size: 0.75rem; }

        /* Alert section */
        .pin-alerts-section { border-top: 1px solid var(--glass-border); margin-top: 10px; padding-top: 8px; }
        .pin-alerts-header {
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; padding: 2px 0;
        }
        .pin-alerts-title { font-size: 0.8rem; color: var(--text); font-weight: 600; }
        .pin-alerts-toggle { color: var(--text-muted); font-size: 0.75rem; }
        .pin-alerts-body { display: none; margin-top: 6px; }
        .pin-alerts-body.open { display: block; }

        .alert-rule {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 10px; background: rgba(0,0,0,0.2); border-radius: 6px;
            margin-bottom: 4px; font-size: 0.75rem;
        }
        .alert-rule-text { flex: 1; color: var(--text); }
        .alert-rule-cooldown { color: var(--text-muted); font-size: 0.65rem; }
        .alert-rule-actions { display: flex; gap: 4px; }
        .alert-rule-actions button {
            background: none; border: none; cursor: pointer;
            font-size: 0.7rem; padding: 2px 5px; border-radius: 4px;
        }
        .alert-toggle-btn { color: var(--accent); }
        .alert-delete-btn { color: var(--red); }
        .alert-toggle-btn:hover, .alert-delete-btn:hover { background: rgba(255,255,255,0.05); }

        /* Alert form — single line */
        .alert-form {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
            background: rgba(0,0,0,0.3); border-radius: 6px; padding: 8px 10px; margin-top: 6px;
        }
        .alert-form select, .alert-form input[type="number"] {
            background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
            color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 0.75rem;
        }
        .alert-form select { min-width: 90px; }
        .alert-form input[type="number"] { width: 60px; }
        .alert-form label { font-size: 0.7rem; color: var(--text-muted); }
        .alert-form input[type="checkbox"] { margin: 0; }

        .btn-sm {
            padding: 4px 12px; border-radius: 5px; font-size: 0.73rem;
            cursor: pointer; border: none; font-weight: 600;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { opacity: 0.85; }
        .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(220,50,50,0.2); color: var(--red); }
        .btn-danger:hover { background: rgba(220,50,50,0.3); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/pins.html" class="nav-link active">Pins</a>
                <a href="/settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <div class="pins-container">
        <h1 class="pins-title">Pinned Flights</h1>
        <div id="pinsContent">
            <div class="pins-empty">Loading...</div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/pins.js"></script>
</body>
</html>
