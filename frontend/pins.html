<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Pins</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        /* Full-width page override */
        .page-content.pins-page { max-width: none; padding: 20px 24px; }

        .pins-empty { color: var(--text-muted); text-align: center; padding: 60px 20px; font-size: 0.9rem; }

        /* Grid layout — exactly 2 columns */
        .pins-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .pin-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 14px 16px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: border-color var(--transition);
            overflow: hidden;
        }
        .pin-card:hover { border-color: rgba(255,255,255,0.15); }

        /* Top band — wrap to 2 rows if needed */
        .pin-top-band {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 0.78rem;
        }
        .pin-logo { width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0; }
        .pin-airline { font-weight: 700; color: var(--text); white-space: nowrap; }
        .pin-dir {
            font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px;
            text-transform: uppercase; flex-shrink: 0;
        }
        .pin-dir.outbound { background: rgba(108,99,255,0.2); color: var(--accent); }
        .pin-dir.return { background: rgba(0,200,100,0.2); color: var(--green); }
        .pin-route { color: var(--text-muted); white-space: nowrap; }
        .pin-sep { color: rgba(255,255,255,0.1); }
        .pin-val { white-space: nowrap; }
        .pin-lbl { color: var(--text-muted); font-size: 0.6rem; margin-right: 2px; }
        .pin-num { font-weight: 600; color: var(--text); }
        .pin-change { font-size: 0.68rem; margin-left: 1px; }
        .pin-change.down { color: var(--green); }
        .pin-change.up { color: var(--red); }
        .pin-actions { display: flex; gap: 5px; margin-left: auto; flex-shrink: 0; }

        /* Chart */
        .pin-chart { margin-top: 8px; position: relative; height: 110px; }
        .pin-chart-empty { color: var(--text-muted); text-align: center; padding: 16px; font-size: 0.72rem; }

        /* Alerts — always visible inline */
        .pin-alerts { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }

        .alert-row {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 8px; background: rgba(0,0,0,0.2); border-radius: 5px; font-size: 0.72rem;
        }
        .alert-row-text { flex: 1; color: var(--text); }
        .alert-row-cd { color: var(--text-muted); font-size: 0.62rem; }
        .alert-row .abtn {
            background: none; border: none; cursor: pointer; font-size: 0.72rem;
            padding: 1px 5px; border-radius: 3px; color: var(--text-muted);
        }
        .alert-row .abtn:hover { background: rgba(255,255,255,0.06); }
        .alert-row .abtn.del { color: var(--red); }

        /* Inline add-alert form */
        .alert-add {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 8px; background: rgba(0,0,0,0.15); border-radius: 5px; font-size: 0.72rem;
        }
        .alert-add select, .alert-add input[type="number"] {
            background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
            color: var(--text); padding: 3px 5px; border-radius: 3px; font-size: 0.72rem;
        }
        .alert-add select { min-width: 80px; }
        .alert-add input[type="number"] { width: 52px; }
        .alert-add label { font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 2px; }
        .alert-add input[type="checkbox"] { margin: 0; }
        .alert-add .abtn {
            background: none; border: none; cursor: pointer; font-weight: 700;
            padding: 2px 7px; border-radius: 3px; font-size: 0.82rem;
        }
        .alert-add .abtn.add { color: var(--green); }
        .alert-add .abtn.add:hover { background: rgba(0,200,100,0.1); }

        .btn-sm {
            padding: 3px 10px; border-radius: 4px; font-size: 0.7rem;
            cursor: pointer; border: none; font-weight: 600;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { opacity: 0.85; }
        .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); text-decoration: none; }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(220,50,50,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(220,50,50,0.25); }

        @media (max-width: 900px) {
            .pins-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/pins.html" class="nav-link active">Pins</a>
                <a href="/settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <main class="page-content pins-page">
        <h1 class="page-title">Pinned Flights</h1>
        <div id="pinsContent">
            <div class="pins-empty">Loading...</div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/pins.js"></script>
</body>
</html>
