<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Searches</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">✈</span>
                <span class="logo-text">FlyCal</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/searches.html" class="nav-link active">Searches</a>
                <a href="/settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawlerFromHeader()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <main class="page-content">
        <h1 class="page-title">Search History</h1>
        <div class="glass-card">
            <div class="table-wrapper">
                <table class="data-table" id="searchesTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Route</th>
                            <th>Date Range</th>
                            <th>Airlines</th>
                            <th>Status</th>
                            <th>Results</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="searchesBody">
                    </tbody>
                </table>
                <div class="empty-state" id="emptySearches">
                    <p>No searches yet</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/calendar.js"></script>
    <script>
        let allSearches = [];
        let searchesSettings = null;
        let expandedSearchId = null;

        async function loadSearchesSettings() {
            try {
                searchesSettings = await API.getSettings();
            } catch (e) {
                searchesSettings = { ideal_price: 100, time_slots: [] };
            }
        }

        async function loadSearches() {
            try {
                const searches = await API.get('/api/searches');
                allSearches = searches;
                renderSearches(searches);
            } catch (e) {
                console.error('Failed to load searches:', e);
            }
        }

        function renderSearches(searches) {
            const tbody = document.getElementById('searchesBody');
            const empty = document.getElementById('emptySearches');

            if (!searches || searches.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            let html = '';
            for (const s of searches) {
                const created = s.created_at ? new Date(s.created_at).toLocaleDateString('en-US', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                }) : '—';
                const airlines = (s.airlines || []).join(', ') || 'All';
                const statusClass = s.status === 'success' ? 'status-success' :
                                    s.status === 'running' ? 'status-running' :
                                    s.status === 'error' ? 'status-error' : 'status-unknown';
                const statusLabel = s.status === 'success' ? 'Done' :
                                    s.status === 'running' ? 'Running' :
                                    s.status === 'error' ? 'Error' : '—';
                const isExpanded = expandedSearchId === s.id;

                html += `<tr style="cursor:pointer" onclick="toggleExpand(${s.id})">
                    <td>${created}</td>
                    <td><strong>${(s.origin_city || '').toUpperCase()}</strong> → <strong>${(s.destination_city || '').toUpperCase()}</strong></td>
                    <td>${s.date_from} → ${s.date_to}</td>
                    <td>${airlines}</td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td>${s.flight_count || 0} flights</td>
                    <td class="actions-cell" onclick="event.stopPropagation()">
                        <button class="btn-sm btn-accent" onclick="reuseSearch(${s.id})">Reuse</button>
                    </td>
                </tr>`;

                // Expandable sub-section with flight results
                if (isExpanded && s.flights && s.flights.length > 0) {
                    const outbound = s.flights.filter(f => f.direction === 'outbound');
                    const ret = s.flights.filter(f => f.direction === 'return');
                    html += `<tr><td colspan="7" style="padding:0">
                        <div class="search-expand-content">
                            <div class="search-expand-flights">
                                <div class="search-expand-col">
                                    <h4>Outbound (${outbound.length})</h4>
                                    <div id="expandOut_${s.id}" class="calendar-container"></div>
                                </div>
                                <div class="search-expand-col">
                                    <h4>Return (${ret.length})</h4>
                                    <div id="expandRet_${s.id}" class="calendar-container"></div>
                                </div>
                            </div>
                        </div>
                    </td></tr>`;
                } else if (isExpanded) {
                    html += `<tr><td colspan="7" style="padding:0">
                        <div class="search-expand-content">
                            <p class="text-muted">No flight results for this search.</p>
                        </div>
                    </td></tr>`;
                }
            }
            tbody.innerHTML = html;

            // Render expanded calendars after DOM insertion
            if (expandedSearchId) {
                const s = allSearches.find(x => x.id === expandedSearchId);
                if (s && s.flights && s.flights.length > 0) {
                    const outbound = s.flights.filter(f => f.direction === 'outbound');
                    const ret = s.flights.filter(f => f.direction === 'return');
                    const outEl = document.getElementById(`expandOut_${s.id}`);
                    const retEl = document.getElementById(`expandRet_${s.id}`);
                    if (outEl) renderCalendar(outEl, outbound, null, () => {}, searchesSettings);
                    if (retEl) renderCalendar(retEl, ret, null, () => {}, searchesSettings);
                }
            }
        }

        function toggleExpand(searchId) {
            expandedSearchId = (expandedSearchId === searchId) ? null : searchId;
            renderSearches(allSearches);
        }

        function reuseSearch(searchId) {
            const s = allSearches.find(x => x.id === searchId);
            if (!s) return;
            const params = new URLSearchParams({
                origin: s.origin_city,
                destination: s.destination_city,
                date_from: s.date_from,
                date_to: s.date_to,
                trip_type: s.trip_type,
                airlines: (s.airlines || []).join(','),
                autorun: '1'
            });
            window.location.href = '/?' + params.toString();
        }

        async function toggleCrawlerFromHeader() {
            try {
                await API.toggleCrawler();
                await loadCrawlerStatus();
            } catch (e) {}
        }

        async function loadCrawlerStatus() {
            try {
                const status = await API.get('/api/crawler/status');
                const dot = document.getElementById('crawlerDot');
                const label = document.getElementById('crawlerLabel');
                dot.className = 'crawler-dot ' + (status.enabled ? 'active' : 'inactive');
                label.textContent = status.enabled ? 'Crawler ON' : 'Crawler OFF';
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSearchesSettings();
            loadSearches();
            loadCrawlerStatus();
        });
    </script>
</body>
</html>
