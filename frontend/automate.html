<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Automate</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .page-content.automate-page { max-width: none; padding: 20px 24px; }

        .automate-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .automate-header .page-title { margin-bottom: 0; }

        .global-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .global-toggle .toggle-label { color: var(--text-muted); }

        .crawler-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .crawler-empty { color: var(--text-muted); text-align: center; padding: 40px 20px; font-size: 0.85rem; }

        .crawler-row {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 10px 14px;
            backdrop-filter: blur(var(--glass-blur));
            font-size: 0.8rem;
        }
        .crawler-row:hover { border-color: rgba(255,255,255,0.15); }
        .crawler-route { font-weight: 700; color: var(--text); white-space: nowrap; }
        .crawler-dates { color: var(--text-muted); white-space: nowrap; }
        .crawler-airlines { color: var(--text-muted); font-size: 0.7rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .crawler-sep { color: rgba(255,255,255,0.1); }
        .crawler-schedule select {
            background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
            color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 0.75rem;
        }
        .crawler-actions { display: flex; gap: 5px; margin-left: auto; }

        .view-logs-link {
            display: inline-flex; align-items: center; gap: 4px;
            color: var(--text-muted); font-size: 0.78rem; text-decoration: none; margin-top: 12px;
        }
        .view-logs-link:hover { color: var(--accent); }

        /* Toggle switch — scoped to avoid main.css conflict */
        .auto-switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
        .auto-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
        .auto-slider {
            position: absolute; cursor: pointer; inset: 0;
            background: rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s;
        }
        .auto-slider:before {
            content: ''; position: absolute; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
        }
        .auto-switch input:checked + .auto-slider { background: var(--accent); }
        .auto-switch input:checked + .auto-slider:before { transform: translateX(16px); }
        .auto-switch input:disabled + .auto-slider { opacity: 0.35; cursor: not-allowed; }
        .crawler-row.disabled { opacity: 0.5; }

        .btn-sm { padding: 4px 10px; border-radius: 4px; font-size: 0.72rem; cursor: pointer; border: none; font-weight: 600; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { opacity: 0.85; }
        .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(220,50,50,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(220,50,50,0.25); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/tracks.html" class="nav-link">Tracks</a>
                <a href="/automate.html" class="nav-link active">Automate</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/settings.html" class="nav-link">Settings</a>
                <a href="/logs.html" class="nav-link">Logs</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleGlobal()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Manual & Silent Updating</span>
            </div>
        </div>
    </header>

    <main class="page-content automate-page">
        <div class="automate-header">
            <h1 class="page-title">Automate</h1>
            <div class="global-toggle">
                <span class="toggle-label">Global</span>
                <label class="auto-switch">
                    <input type="checkbox" id="globalToggle" onchange="toggleGlobal()">
                    <span class="auto-slider"></span>
                </label>
                <span id="globalStatus" style="font-size:0.75rem;color:var(--text-muted)"></span>
            </div>
            <button class="btn-sm btn-accent" onclick="scheduleLastSearch()">+ Schedule last search</button>
        </div>

        <div id="crawlerList" class="crawler-list">
            <div class="crawler-empty">Loading...</div>
        </div>

        <a href="/logs.html" class="view-logs-link">View all logs &rarr;</a>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/automate.js"></script>
</body>
</html>
