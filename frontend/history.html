<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — History</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">✈</span>
                <span class="logo-text">FlyCal</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/history.html" class="nav-link active">History</a>
                <a href="/settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawlerFromHeader()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <main class="page-content">
        <div class="history-toolbar">
            <h1 class="page-title" style="margin-bottom:0">History</h1>
            <div class="btn-group">
                <button class="btn-sm btn-danger" id="btnDeleteSelected" onclick="deleteSelected()" style="display:none">Delete selected</button>
            </div>
        </div>
        <div class="glass-card">
            <div class="table-wrapper">
                <table class="data-table" id="searchesTable">
                    <thead>
                        <tr>
                            <th style="width:30px"><input type="checkbox" class="search-checkbox" id="checkAll" onchange="toggleCheckAll(this)"></th>
                            <th>Date</th>
                            <th>Route</th>
                            <th>Date Range</th>
                            <th>Airlines</th>
                            <th>Status</th>
                            <th>Results</th>
                            <th>Min Price</th>
                            <th>Max Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="searchesBody">
                    </tbody>
                </table>
                <div class="empty-state" id="emptySearches">
                    <p>No searches yet</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/calendar.js"></script>
    <script>
        let allSearches = [];
        let searchesSettings = null;
        let expandedSearchId = null;
        let selectedSearchIds = new Set();

        async function loadSearchesSettings() {
            try {
                searchesSettings = await API.getSettings();
            } catch (e) {
                searchesSettings = { ideal_price: 100, time_slots: [] };
            }
        }

        async function loadSearches() {
            try {
                const searches = await API.get('/api/searches');
                allSearches = searches;
                renderSearches(searches);
            } catch (e) {
                console.error('Failed to load searches:', e);
            }
        }

        function getMinMaxPrices(flights) {
            if (!flights || flights.length === 0) return { min: null, max: null };
            const prices = flights.map(f => f.price).filter(p => p != null && p > 0);
            if (prices.length === 0) return { min: null, max: null };
            return { min: Math.min(...prices), max: Math.max(...prices) };
        }

        function renderSearches(searches) {
            const tbody = document.getElementById('searchesBody');
            const empty = document.getElementById('emptySearches');

            if (!searches || searches.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                updateDeleteBtn();
                return;
            }
            empty.classList.add('hidden');

            let html = '';
            for (const s of searches) {
                const created = s.created_at ? new Date(s.created_at).toLocaleDateString('en-US', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                }) : '—';

                const airlinesHtml = (s.airlines || []).map(name => {
                    const flight = (s.flights || []).find(f => f.airline_name === name && f.airline_logo_url);
                    if (flight && flight.airline_logo_url) {
                        return `<img src="${flight.airline_logo_url}" alt="${name}" title="${name}" style="width:20px;height:20px;border-radius:3px;vertical-align:middle;margin-right:2px" onerror="this.style.display='none'">`;
                    }
                    return `<span title="${name}" style="display:inline-block;width:20px;height:20px;border-radius:3px;background:var(--glass-bg);text-align:center;line-height:20px;font-size:0.5rem;font-weight:700;color:var(--accent);vertical-align:middle;margin-right:2px">${(name||'').substring(0,2).toUpperCase()}</span>`;
                }).join('') || 'All';

                const statusClass = s.status === 'success' ? 'status-success' :
                                    s.status === 'running' ? 'status-running' :
                                    s.status === 'error' ? 'status-error' :
                                    s.status === 'cancelled' ? 'status-cancelled' : 'status-unknown';
                const statusLabel = s.status === 'success' ? 'Done' :
                                    s.status === 'running' ? 'Running' :
                                    s.status === 'error' ? 'Error' :
                                    s.status === 'cancelled' ? 'Cancelled' : '—';
                const isExpanded = expandedSearchId === s.id;
                const isChecked = selectedSearchIds.has(s.id);
                const { min, max } = getMinMaxPrices(s.flights);

                html += `<tr style="cursor:pointer" onclick="toggleExpand(${s.id})">
                    <td onclick="event.stopPropagation()"><input type="checkbox" class="search-checkbox" data-search-id="${s.id}" ${isChecked ? 'checked' : ''} onchange="toggleSearchCheck(${s.id}, this)"></td>
                    <td>${created}</td>
                    <td><strong>${(s.origin_city || '').toUpperCase()}</strong> → <strong>${(s.destination_city || '').toUpperCase()}</strong></td>
                    <td>${s.date_from} → ${s.date_to}</td>
                    <td>${airlinesHtml}</td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td>${s.flight_count || 0} flights</td>
                    <td>${min != null ? Math.round(min) + '€' : '—'}</td>
                    <td>${max != null ? Math.round(max) + '€' : '—'}</td>
                    <td class="actions-cell" onclick="event.stopPropagation()">
                        <button class="btn-sm btn-accent" onclick="reuseSearch(${s.id})">Reuse</button>
                    </td>
                </tr>`;

                if (isExpanded && s.flights && s.flights.length > 0) {
                    const outbound = s.flights.filter(f => f.direction === 'outbound');
                    const ret = s.flights.filter(f => f.direction === 'return');
                    html += `<tr><td colspan="10" style="padding:0">
                        <div class="search-expand-content">
                            <div class="search-expand-flights">
                                <div class="search-expand-col">
                                    <h4>Outbound (${outbound.length})</h4>
                                    <div class="search-expand-compact">
                                        ${renderCompactFlights(outbound)}
                                    </div>
                                </div>
                                <div class="search-expand-col">
                                    <h4>Return (${ret.length})</h4>
                                    <div class="search-expand-compact">
                                        ${renderCompactFlights(ret)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td></tr>`;
                } else if (isExpanded) {
                    html += `<tr><td colspan="10" style="padding:0">
                        <div class="search-expand-content">
                            <p class="text-muted">No flight results for this search.</p>
                        </div>
                    </td></tr>`;
                }
            }
            tbody.innerHTML = html;
            updateDeleteBtn();
        }

        function renderCompactFlights(flights) {
            if (!flights || flights.length === 0) return '<p class="text-muted">No flights</p>';

            const byDate = {};
            flights.forEach(f => { (byDate[f.flight_date] = byDate[f.flight_date] || []).push(f); });
            const sortedDates = Object.keys(byDate).sort();

            let html = '';
            for (const dateKey of sortedDates) {
                const d = new Date(dateKey + 'T00:00:00');
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
                const dayNum = d.getDate();
                const monthName = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
                html += `<div class="compact-day-header">${dayName} ${dayNum} ${monthName}</div>`;

                const dayFlights = byDate[dateKey].sort((a, b) =>
                    (a.departure_time || '').localeCompare(b.departure_time || '')
                );
                for (const f of dayFlights) {
                    const color = searchesSettings ? getFlightColor(f, searchesSettings) : 'orange';
                    const abbrev = (f.airline_name || '??').substring(0, 2).toUpperCase();
                    const duration = calculateDuration(f.departure_time, f.arrival_time);

                    html += `<div class="flight-row color-${color}" style="height:26px;font-size:0.72rem">`;
                    if (f.airline_logo_url) {
                        html += `<img src="${f.airline_logo_url}" alt="${f.airline_name}" class="flight-row-logo" style="width:20px;height:20px" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`;
                        html += `<span class="flight-row-abbrev" style="display:none;width:20px;font-size:0.55rem">${abbrev}</span>`;
                    } else {
                        html += `<span class="flight-row-abbrev" style="width:20px;font-size:0.55rem">${abbrev}</span>`;
                    }
                    html += `<span class="flight-row-times">${f.departure_time || '--:--'} → ${f.arrival_time || '--:--'}</span>`;
                    if (duration) {
                        html += `<span class="flight-row-duration">${duration}</span>`;
                    }
                    html += `<span class="flight-row-airports">${f.origin_airport || '???'}→${f.destination_airport || '???'}</span>`;
                    html += `<span class="flight-row-price">${Math.round(f.price)}€</span>`;
                    html += `</div>`;
                }
            }
            return html;
        }

        function toggleExpand(searchId) {
            expandedSearchId = (expandedSearchId === searchId) ? null : searchId;
            renderSearches(allSearches);
        }

        function toggleSearchCheck(searchId, checkbox) {
            if (checkbox.checked) selectedSearchIds.add(searchId);
            else selectedSearchIds.delete(searchId);
            updateDeleteBtn();
        }

        function toggleCheckAll(checkbox) {
            if (checkbox.checked) allSearches.forEach(s => selectedSearchIds.add(s.id));
            else selectedSearchIds.clear();
            renderSearches(allSearches);
        }

        function updateDeleteBtn() {
            const btn = document.getElementById('btnDeleteSelected');
            btn.style.display = selectedSearchIds.size > 0 ? 'inline-block' : 'none';
            if (selectedSearchIds.size > 0) btn.textContent = `Delete selected (${selectedSearchIds.size})`;
        }

        function deleteSelected() {
            if (selectedSearchIds.size === 0) return;
            Toast.confirm(`Delete ${selectedSearchIds.size} search(es)?`, async () => {
                let deleted = 0;
                for (const id of selectedSearchIds) {
                    try { await API.del(`/api/searches/${id}`); deleted++; }
                    catch (e) { console.error(`Failed to delete search ${id}:`, e); }
                }
                selectedSearchIds.clear();
                document.getElementById('checkAll').checked = false;
                Toast.success(`Deleted ${deleted} search(es).`);
                await loadSearches();
            });
        }

        function reuseSearch(searchId) {
            const s = allSearches.find(x => x.id === searchId);
            if (!s) return;
            const params = new URLSearchParams({
                origin: s.origin_city, destination: s.destination_city,
                date_from: s.date_from, date_to: s.date_to,
                trip_type: s.trip_type, airlines: (s.airlines || []).join(','),
                autorun: '1'
            });
            window.location.href = '/?' + params.toString();
        }

        async function toggleCrawlerFromHeader() {
            try {
                const result = await API.toggleCrawler();
                await loadCrawlerStatus();
                const status = await API.get('/api/crawler/status');
                const target = status.target_search;
                let msg = result.enabled ? 'Crawler enabled' : 'Crawler disabled';
                if (result.enabled && target) {
                    msg += ` for ${(target.origin_city||'').toUpperCase()} → ${(target.destination_city||'').toUpperCase()}`;
                    if (status.next_run) {
                        const next = new Date(status.next_run).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                        msg += ` — Next: ${next}`;
                    }
                }
                if (result.enabled) Toast.success(msg, 6000);
                else Toast.info(msg);
            } catch (e) { Toast.error('Failed to toggle crawler.'); }
        }

        async function loadCrawlerStatus() {
            try {
                const status = await API.get('/api/crawler/status');
                const dot = document.getElementById('crawlerDot');
                const label = document.getElementById('crawlerLabel');
                dot.className = 'crawler-dot ' + (status.enabled ? 'active' : 'inactive');
                label.textContent = status.enabled ? 'Stay Updated ON' : 'On-demand Only';
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSearchesSettings();
            loadSearches();
            loadCrawlerStatus();
        });
    </script>

    <style>
        .compact-day-header {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--accent);
            padding: 4px 6px 2px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .search-expand-compact {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</body>
</html>
