<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Activity</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* Safari full-height full-width layout */
        html, body {
            height: 100% !important;
            min-height: 100% !important;
            margin: 0;
            padding: 0;
            display: -webkit-flex !important;
            display: flex !important;
            -webkit-flex-direction: column !important;
            flex-direction: column !important;
            overflow: hidden !important;
        }
        .header { -webkit-flex-shrink: 0; flex-shrink: 0; }
        .page-content.logs-page {
            max-width: none !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 20px 24px !important;
            -webkit-flex: 1 1 0px !important; flex: 1 1 0px !important;
            display: -webkit-flex !important; display: flex !important;
            -webkit-flex-direction: column !important; flex-direction: column !important;
            overflow: hidden !important;
            box-sizing: border-box;
        }
        .logs-header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-shrink: 0; }
        .logs-header .page-title { margin-bottom: 0; }
        .logs-full {
            -webkit-flex: 1 1 0px; flex: 1 1 0px;
            min-height: 0; /* critical for Safari flex overflow */
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            background: rgba(0,0,0,0.3); border-radius: var(--radius-sm);
            padding: 12px; font-family: 'Menlo','Monaco',monospace; font-size: 0.75rem;
        }
        .log-line { padding: 3px 0; color: var(--text-muted); display: flex; gap: 8px; align-items: baseline; }
        .log-dt { color: rgba(255,255,255,0.35); flex-shrink: 0; }
        .log-badge {
            font-size: 0.65rem; font-weight: 700; padding: 1px 5px; border-radius: 3px;
            text-transform: uppercase; flex-shrink: 0; min-width: 52px; text-align: center;
        }
        .log-badge.scan { background: rgba(108,99,255,0.2); color: var(--accent); }
        .log-badge.track { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .log-badge.alert { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .log-badge.crawler { background: rgba(168,85,247,0.2); color: #a855f7; }
        .log-badge.email { background: rgba(6,182,212,0.2); color: #06b6d4; }
        .log-badge.system { background: rgba(255,255,255,0.06); color: var(--text-muted); }
        .log-action { font-weight: 600; flex-shrink: 0; }
        .log-action.success, .log-action.created, .log-action.sent, .log-action.enabled { color: var(--green); }
        .log-action.error, .log-action.deleted, .log-action.disabled { color: var(--red); }
        .log-action.triggered { color: #f59e0b; }
        .log-action.running, .log-action.started { color: var(--accent); }
        .log-action.cancelled, .log-action.skipped, .log-action.updated { color: var(--text-muted); }
        .log-msg { color: var(--text-muted); }
        .btn-sm { padding: 4px 10px; border-radius: 4px; font-size: 0.72rem; cursor: pointer; border: none; font-weight: 600; }
        .btn-danger { background: rgba(220,50,50,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(220,50,50,0.25); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/track.html" class="nav-link">Track</a>
                <a href="/automate.html" class="nav-link">Automate</a>
                <a href="/settings.html" class="nav-link">Settings</a>
                <a href="/activity.html" class="nav-link active">Activity</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawlerFromHeader()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Manual & Silent Updating</span>
            </div>
        </div>
    </header>

    <main class="page-content logs-page">
        <div class="logs-header">
            <h1 class="page-title">Activity</h1>
            <button class="btn-sm btn-danger" onclick="clearLogs()" style="margin-left:auto">Clear all</button>
        </div>
        <div class="logs-full" id="logsContainer"></div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/logo-status.js"></script>
    <script>
    async function init() {
        await Promise.all([loadLogs(), loadBadgeStatus()]);
    }

    async function loadBadgeStatus() {
        try {
            const status = await API.getAutomateStatus();
            updateBadge(status.enabled);
        } catch (e) {}
    }

    function updateBadge(enabled) {
        const dot = document.getElementById('crawlerDot');
        const label = document.getElementById('crawlerLabel');
        if (dot) dot.style.background = enabled ? 'var(--green)' : 'var(--red)';
        if (label) label.textContent = enabled ? 'Automate & Update Me : ON' : 'Manual & Silent Updating : OFF';
    }

    async function toggleCrawlerFromHeader() {
        try {
            const res = await API.toggleGlobalCrawler();
            updateBadge(res.enabled);
            Toast.success(res.enabled ? 'Automate & Update Me enabled' : 'Automate & Update Me disabled');
        } catch (e) { Toast.error('Failed: ' + e.message); }
    }

    async function loadLogs() {
        try {
            const logs = await API.getAutomateLogs();
            const container = document.getElementById('logsContainer');
            if (!logs.length) { container.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No logs yet</div>'; return; }
            container.innerHTML = logs.map(log => {
                const dt = log.timestamp ? fmtDT(log.timestamp) : '';
                const safeType = escapeHtml(log.type);
                const safeAction = escapeHtml(log.action);
                const safeMsg = escapeHtml(log.message);
                return `<div class="log-line"><span class="log-dt">${dt}</span><span class="log-badge ${safeType}">${safeType}</span><span class="log-action ${safeAction}">${safeAction}</span><span class="log-msg">${safeMsg}</span></div>`;
            }).join('');
        } catch (e) { console.error('Logs error:', e); }
    }

    function fmtDT(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString('sv-SE', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).replace(',', '');
    }

    async function clearLogs() {
        Toast.confirm('Clear all activity logs?', async () => {
            try {
                await API.del('/api/automate/logs');
                document.getElementById('logsContainer').innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">No logs yet</div>';
                Toast.success('Logs cleared');
            } catch (e) { Toast.error('Failed: ' + e.message); }
        });
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
