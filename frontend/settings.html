<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Settings</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo" style="text-decoration:none">
                <img src="/logo.png" alt="FlyCal" class="logo-img">
                <span class="logo-text">FlyCal</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Scan</a>
                <a href="/tracks.html" class="nav-link">Tracks</a>
                <a href="/automate.html" class="nav-link">Automate</a>
                <a href="/history.html" class="nav-link">History</a>
                <a href="/settings.html" class="nav-link active">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawlerFromHeader()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <main class="page-content">
        <h1 class="page-title">Settings</h1>
        
        <section class="settings-section glass-card">
            <h2>Reference Price</h2>
            <div class="form-row">
                <label>Ideal price (€)</label>
                <input type="number" id="idealPrice" min="0" step="1" value="40" class="input-field input-sm">
            </div>
        </section>

        <section class="settings-section glass-card">
            <h2>Airlines</h2>
            <div id="airlinesListSettings"></div>
            <button class="btn-sm btn-accent" onclick="addAirline()" style="margin-top:10px">+ Add airline</button>
        </section>

        <section class="settings-section glass-card">
            <h2>Time Slots</h2>
            <div id="timeSlotsContainer"></div>
            <button class="btn-sm btn-accent" onclick="addTimeSlot()" style="margin-top:10px">+ Add slot</button>
        </section>

        <section class="settings-section glass-card">
            <h2>Email Notificaitons</h2>
            <div class="form-grid">
                <div class="form-row">
                    <label>SMTP Host</label>
                    <input type="text" id="smtpHost" class="input-field" placeholder="smtp.gmail.com">
                </div>
                <div class="form-row">
                    <label>Port</label>
                    <input type="number" id="smtpPort" class="input-field input-sm" placeholder="587" value="587">
                </div>
                <div class="form-row">
                    <label>User</label>
                    <input type="text" id="smtpUser" class="input-field" placeholder="user@gmail.com">
                </div>
                <div class="form-row">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="smtpPassword" class="input-field" placeholder="••••••••">
                        <button type="button" class="btn-toggle-pw" onclick="togglePasswordVisibility()" title="Show/Hide password">
                            <svg id="pwIconEye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg id="pwIconEyeOff" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-row">
                    <label>Recipient email</label>
                    <input type="email" id="smtpTo" class="input-field" placeholder="dest@email.com">
                </div>
                <div class="form-row">
                    <label>Server hostname / IP</label>
                    <input type="text" id="serverHostname" class="input-field" placeholder="192.168.1.50">
                </div>
                <div class="form-row">
                    <label>Send email with results after each scan</label>
                    <div class="toggle-switch" id="emailToggle" onclick="toggleEmail()">
                        <div class="toggle-slider"></div>
                    </div>
                </div>
            </div>
            <p style="margin-bottom:10px">An email notification will be sent automatically with attached trackers.</p>
            <div style="margin-top:10px;display:flex;gap:6px">
                <button class="btn-sm btn-accent" onclick="testSmtp()">Test SMTP</button>
            </div>
            <p id="smtpTestResult" class="text-muted" style="margin-top:6px"></p>
        </section>

        <section class="settings-section glass-card">
            <h2>Data Import / Export</h2>
            <p class="text-muted" style="margin-bottom:10px">Export or import all settings and data</p>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <input type="file" id="importFileInput" accept=".csv" style="display:none" onchange="importData(this)">
                <button class="btn-sm btn-accent" onclick="document.getElementById('importFileInput').click()">Import CSV</button>
                <button class="btn-sm btn-accent" onclick="exportData()">Export CSV</button>
                <button class="btn-sm btn-danger" onclick="resetDatabase()">Reset Database</button>
                <span id="importResult" class="text-muted" style="font-size:0.8rem"></span>
            </div>
        </section>

        <div class="version-footer">
            FlyCal v4.0 &copy; 2026 simoroco
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/settings.js"></script>
    <script>
    async function toggleCrawlerFromHeader() {
        const dot = document.getElementById('crawlerDot');
        const label = document.getElementById('crawlerLabel');
        try {
            const res = await API.toggleGlobalCrawler();
            if (dot) dot.style.background = res.enabled ? 'var(--green)' : 'var(--red)';
            if (label) label.textContent = res.enabled ? 'Crawler ON' : 'Crawler OFF';
            Toast.success(res.enabled ? 'Crawler enabled' : 'Crawler disabled');
        } catch (e) { Toast.error('Failed: ' + e.message); }
    }
    </script>
</body>
</html>
