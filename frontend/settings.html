<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyCal — Settings</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">✈</span>
                <span class="logo-text">FlyCal</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/searches.html" class="nav-link">Searches</a>
                <a href="/settings.html" class="nav-link active">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="crawler-badge" id="crawlerBadge" onclick="toggleCrawler()">
                <span class="crawler-dot" id="crawlerDot"></span>
                <span id="crawlerLabel">Crawler</span>
            </div>
        </div>
    </header>

    <main class="page-content">
        <h1 class="page-title">Settings</h1>

        <section class="settings-section glass-card">
            <h2>Airlines</h2>
            <div id="airlinesListSettings"></div>
            <button class="btn-sm btn-accent" onclick="addAirline()" style="margin-top:10px">+ Add airline</button>
        </section>

        <section class="settings-section glass-card">
            <h2>Reference Price</h2>
            <div class="form-row">
                <label>Ideal price (€)</label>
                <input type="number" id="idealPrice" min="0" step="1" value="100" class="input-field input-sm">
                <button class="btn-sm btn-accent" onclick="saveIdealPrice()">Save</button>
            </div>
        </section>

        <section class="settings-section glass-card">
            <h2>Time Slots</h2>
            <div id="timeSlotsContainer"></div>
            <button class="btn-sm btn-accent" onclick="addTimeSlot()" style="margin-top:10px">+ Add slot</button>
            <button class="btn-sm btn-primary" onclick="saveTimeSlots()" style="margin-top:10px;margin-left:6px">Save</button>
        </section>

        <section class="settings-section glass-card">
            <h2>Automatic Crawler</h2>
            <div class="form-row">
                <label>Enable (07:00 & 20:00)</label>
                <div class="toggle-switch" id="crawlerToggle" onclick="toggleCrawler()">
                    <div class="toggle-slider"></div>
                </div>
                <span id="crawlerStatus" class="status-text">Inactive</span>
            </div>
            <div class="crawler-info">
                <p>Last run: <span id="lastRun">—</span></p>
                <p>Next run: <span id="nextRun">—</span></p>
            </div>
            <button class="btn-sm btn-accent" onclick="runCrawlerNow()">Run now</button>
            <h3 style="margin-top:16px">Recent Logs</h3>
            <div class="logs-container" id="logsContainer">
                <p class="text-muted">Loading...</p>
            </div>
        </section>

        <section class="settings-section glass-card">
            <h2>Email</h2>
            <div class="form-grid">
                <div class="form-row">
                    <label>SMTP Host</label>
                    <input type="text" id="smtpHost" class="input-field" placeholder="smtp.gmail.com">
                </div>
                <div class="form-row">
                    <label>Port</label>
                    <input type="number" id="smtpPort" class="input-field input-sm" placeholder="587" value="587">
                </div>
                <div class="form-row">
                    <label>User</label>
                    <input type="text" id="smtpUser" class="input-field" placeholder="user@gmail.com">
                </div>
                <div class="form-row">
                    <label>Password</label>
                    <input type="password" id="smtpPassword" class="input-field" placeholder="••••••••">
                </div>
                <div class="form-row">
                    <label>Recipient email</label>
                    <input type="email" id="smtpTo" class="input-field" placeholder="dest@email.com">
                </div>
                <div class="form-row">
                    <label>Send email after each crawl</label>
                    <div class="toggle-switch" id="emailToggle" onclick="toggleEmail()">
                        <div class="toggle-slider"></div>
                    </div>
                </div>
            </div>
            <div style="margin-top:10px;display:flex;gap:6px">
                <button class="btn-sm btn-primary" onclick="saveEmailSettings()">Save</button>
                <button class="btn-sm btn-accent" onclick="testSmtp()">Test SMTP</button>
            </div>
            <p id="smtpTestResult" class="text-muted" style="margin-top:6px"></p>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/settings.js"></script>
</body>
</html>
