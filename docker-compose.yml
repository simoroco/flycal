services:
  app:
    build: .
    container_name: flycal
    ports:
      - "${FLYCAL_PORT:-4444}:4444"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Europe/Paris}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
