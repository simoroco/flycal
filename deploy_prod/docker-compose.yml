services:
  app:
    build: ..
    container_name: flycal
    ports:
      - "${FLYCAL_PORT:-4444}:4444"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Europe/Paris}
    shm_size: '2gb'
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
